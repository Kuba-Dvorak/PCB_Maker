<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC control panel</title>
</head>
<body>
    <h1>Frontend placeholder</h1>
    <h2>Simple controls</h2>
    <p>Movement</p>
    <button id="XbuttP">X+</button>
    <button id="XbuttM">X-</button>
    <button id="YbuttP">Y+</button>
    <button id="YbuttM">Y-</button>
    <button id="ZbuttP">Z+</button>
    <button id="ZbuttM">Z-</button>
    <p id="operateAnswer">Result: </p>
    <h2>Printer status</h2>
    <p id="Status">Status: </p>
    <p id="error">Error: </p>
    <p id="position">X: Y: Z:</p>
    <p id="speed">speed: </p>
    <p id="spindlSpeed">spindle speed: </p>
    <h2>Gcode upload</h2>
    <input type="file" id="gcodeInput"> <button id="gcodeUpload">upload</button>
    <p id="uploadSuccesText"></p>
    <h2>Gcodes list</h2>
    <div id="GcodeList"></div>
</body>
<script src="./index.js"></script>
</html>
