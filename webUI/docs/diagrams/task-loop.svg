<svg width="1100" height="690" viewBox="0 0 1100 690" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">nanoComm task loop</title>
  <desc id="desc">Flowchart showing readTask, doTask, ping, report handling, emergency check, command preparation, sending command to Nano, waiting for report, and task completion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1100" height="690" rx="28" fill="url(#bg)"/>
  <text x="550" y="52" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#064e3b">nanoComm Single-Loop Task Flow</text>
  <text x="550" y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">One complex backend task becomes many small basicCMD messages</text>

  <rect x="90" y="135" width="210" height="82" rx="16" fill="#38bdf8" filter="url(#shadow)"/>
  <text x="195" y="169" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#082f49">readTask()</text>
  <text x="195" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#075985">load complex JSON task</text>

  <rect x="445" y="135" width="210" height="82" rx="16" fill="#34d399" filter="url(#shadow)"/>
  <text x="550" y="169" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#064e3b">doTask(task)</text>
  <text x="550" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#065f46">runs until task ends</text>

  <rect x="800" y="135" width="210" height="82" rx="16" fill="#facc15" filter="url(#shadow)"/>
  <text x="905" y="169" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#422006">ping Nano</text>
  <text x="905" y="195" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#713f12">first connection check</text>

  <rect x="800" y="290" width="210" height="82" rx="16" fill="#c084fc" filter="url(#shadow)"/>
  <text x="905" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#581c87">latest report</text>
  <text x="905" y="350" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6b21a8">position, error, state</text>

  <rect x="445" y="290" width="210" height="82" rx="16" fill="#fb7185" filter="url(#shadow)"/>
  <text x="550" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#881337">check soft stop</text>
  <text x="550" y="350" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9f1239">read emergency JSON</text>

  <rect x="90" y="290" width="210" height="82" rx="16" fill="#60a5fa" filter="url(#shadow)"/>
  <text x="195" y="324" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#1e3a8a">write report</text>
  <text x="195" y="350" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">backend can read status</text>

  <rect x="90" y="445" width="210" height="82" rx="16" fill="#2dd4bf" filter="url(#shadow)"/>
  <text x="195" y="479" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#134e4a">prepare basicCMD</text>
  <text x="195" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#115e59">small next movement</text>

  <rect x="445" y="445" width="210" height="82" rx="16" fill="#a78bfa" filter="url(#shadow)"/>
  <text x="550" y="479" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#4c1d95">send to Nano</text>
  <text x="550" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5b21b6">USB serial basicCMD</text>

  <rect x="800" y="445" width="210" height="82" rx="16" fill="#f97316" filter="url(#shadow)"/>
  <text x="905" y="479" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#7c2d12">wait report</text>
  <text x="905" y="505" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412">Nano replies with state</text>

  <rect x="445" y="590" width="210" height="56" rx="16" fill="#22c55e" filter="url(#shadow)"/>
  <text x="550" y="625" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#052e16">done / failed / stopped</text>

  <line x1="300" y1="176" x2="437" y2="176" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="655" y1="176" x2="792" y2="176" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="905" y1="217" x2="905" y2="282" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="800" y1="331" x2="663" y2="331" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="445" y1="331" x2="308" y2="331" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="195" y1="372" x2="195" y2="437" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="300" y1="486" x2="437" y2="486" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="655" y1="486" x2="792" y2="486" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M905 445 C905 398 980 398 980 331 C980 286 950 286 920 290" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M800 506 C742 570 670 618 663 618" fill="none" stroke="#16a34a" stroke-width="5" stroke-dasharray="9 8" marker-end="url(#arrow)"/>
  <path d="M550 372 C550 410 550 420 550 437" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>

  <text x="740" y="604" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534">when task complete or error</text>
  <text x="590" y="421" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">if no soft stop</text>
</svg>
