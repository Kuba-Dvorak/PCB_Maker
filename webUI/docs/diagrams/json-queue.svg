<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">JSON task queue folders</title>
  <desc id="desc">Diagram showing task file movement through initialized, processing, processed, failed, emergency, and reports folders.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1100" height="560" rx="28" fill="url(#bg)"/>
  <text x="550" y="54" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#7c2d12">JSON File Queue</text>
  <text x="550" y="84" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Atomic task files instead of one shared JSON file</text>

  <rect x="70" y="152" width="190" height="105" rx="18" fill="#38bdf8" filter="url(#shadow)"/>
  <text x="165" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#082f49">backend</text>
  <text x="165" y="218" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#075985">writes task_001.tmp</text>
  <text x="165" y="238" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#075985">renames to .json</text>

  <rect x="335" y="152" width="190" height="105" rx="18" fill="#facc15" filter="url(#shadow)"/>
  <text x="430" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#422006">initialized</text>
  <text x="430" y="218" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#713f12">new complex tasks</text>

  <rect x="600" y="152" width="190" height="105" rx="18" fill="#34d399" filter="url(#shadow)"/>
  <text x="695" y="190" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#064e3b">processing</text>
  <text x="695" y="218" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#065f46">active task</text>

  <rect x="865" y="110" width="170" height="86" rx="18" fill="#22c55e" filter="url(#shadow)"/>
  <text x="950" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#052e16">processed</text>
  <text x="950" y="170" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534">task done</text>

  <rect x="865" y="235" width="170" height="86" rx="18" fill="#fb7185" filter="url(#shadow)"/>
  <text x="950" y="270" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#881337">failed</text>
  <text x="950" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9f1239">task error</text>

  <rect x="335" y="365" width="190" height="92" rx="18" fill="#f97316" filter="url(#shadow)"/>
  <text x="430" y="401" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#7c2d12">emergency</text>
  <text x="430" y="428" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412">soft stop request</text>

  <rect x="600" y="365" width="190" height="92" rx="18" fill="#a78bfa" filter="url(#shadow)"/>
  <text x="695" y="401" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#4c1d95">reports</text>
  <text x="695" y="428" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#5b21b6">latest machine state</text>

  <line x1="260" y1="205" x2="327" y2="205" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="294" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">rename</text>

  <line x1="525" y1="205" x2="592" y2="205" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="560" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">move</text>

  <path d="M790 190 C825 160 835 153 857 153" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M790 226 C824 262 835 278 857 278" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="826" y="135" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">success</text>
  <text x="822" y="300" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9f1239">error</text>

  <line x1="525" y1="411" x2="592" y2="411" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="560" y="394" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">read/write</text>

  <path d="M695 365 C695 310 695 292 695 265" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="724" y="325" font-family="Inter, Arial, sans-serif" font-size="12" fill="#475569">status during task</text>

  <rect x="70" y="365" width="190" height="92" rx="18" fill="#ffffff" fill-opacity="0.86" stroke="#fed7aa"/>
  <text x="165" y="397" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#0f172a">File rule</text>
  <text x="165" y="423" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">C++ reads only .json</text>
  <text x="165" y="443" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569">backend writes .tmp first</text>
</svg>
